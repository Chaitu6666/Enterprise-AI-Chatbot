<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama AI Assistant</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #f59e0b;
            --dark-bg: #0f172a;
            --light-bg: #f8fafc;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-light: #64748b;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1e3a8a 50%, var(--primary) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            max-height: 850px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 1px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 28px;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.2);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .header-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-icon {
            font-size: 32px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .header-text h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-text p {
            font-size: 13px;
            opacity: 0.9;
            margin-top: 4px;
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: linear-gradient(180deg, var(--light-bg) 0%, #ffffff 100%);
        }

        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .message {
            display: flex;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 16px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.6;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .message.user .message-content {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message.bot .message-content {
            background: white;
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 6px;
        }

        .loading-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .loading-dot {
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loading-dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .input-container {
            padding: 20px 24px 24px;
            background: white;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--light-bg);
            border-radius: 16px;
            padding: 12px 18px;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .input-wrapper:focus-within {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .input-wrapper textarea {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            max-height: 100px;
            outline: none;
            color: var(--text);
        }

        .input-wrapper textarea::placeholder {
            color: var(--text-light);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            width: 48px;
            height: 48px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        .send-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            color: #991b1b;
            padding: 14px 18px;
            border-radius: 12px;
            border-left: 4px solid #dc2626;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(220, 38, 38, 0.15);
        }

        .error-message i {
            flex-shrink: 0;
        }

        .welcome-message {
            text-align: center;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        .welcome-icon {
            font-size: 48px;
            animation: welcome-bounce 2s ease-in-out infinite;
        }

        @keyframes welcome-bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .welcome-message h2 {
            color: var(--primary);
            margin: 0;
            font-size: 28px;
        }

        .welcome-message p {
            font-size: 15px;
            line-height: 1.7;
            color: var(--text-light);
            margin: 0;
        }

        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .chip {
            background: white;
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text);
        }

        .chip:hover {
            background: var(--light-bg);
            border-color: var(--primary);
            color: var(--primary);
        }

        @media (max-width: 600px) {
            .container {
                max-height: none;
                height: 100vh;
                border-radius: 0;
            }

            .message-content {
                max-width: 85%;
            }

            .header {
                padding: 20px;
            }

            .header-content {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }

            .header-left {
                justify-content: center;
            }

            .header-text h1 {
                font-size: 22px;
            }

            .status-badge {
                width: 100%;
                justify-content: center;
            }

            .chat-container {
                padding: 16px;
            }

            .welcome-message {
                padding: 40px 20px;
            }

            .suggestion-chips {
                gap: 8px;
            }

            .chip {
                font-size: 12px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <div class="header-left">
                    <span class="header-icon">🤖</span>
                    <div class="header-text">
                        <h1>Ollama AI</h1>
                        <p>Intelligent Local Assistant</p>
                    </div>
                </div>
                <div class="status-badge">
                    <span class="status-dot"></span>
                    Ready
                </div>
            </div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="welcome-message">
                <div class="welcome-icon">✨</div>
                <div>
                    <h2>Welcome to Ollama AI</h2>
                    <p>Start a conversation with your intelligent AI assistant powered by Ollama</p>
                </div>
                <div class="suggestion-chips">
                    <div class="chip" onclick="sendSuggestion('What is artificial intelligence?')">AI Basics</div>
                    <div class="chip" onclick="sendSuggestion('Help me write code')">Code Help</div>
                    <div class="chip" onclick="sendSuggestion('Explain quantum computing')">Learn</div>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="messageInput" placeholder="Ask me anything... (Shift+Enter for new line)" rows="1"></textarea>
            </div>
            <button class="send-btn" id="sendBtn" title="Send message">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        let isLoading = false;

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // Handle Enter key
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Send button click
        sendBtn.addEventListener('click', sendMessage);

        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', isUser ? 'user' : 'bot');

            const contentDiv = document.createElement('div');
            contentDiv.classList.add('message-content');
            contentDiv.textContent = text;

            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addLoadingMessage() {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', 'bot');
            messageDiv.id = 'loadingMessage';

            const contentDiv = document.createElement('div');
            contentDiv.classList.add('message-content', 'loading-container');

            for (let i = 0; i < 3; i++) {
                const dot = document.createElement('div');
                dot.classList.add('loading-dot');
                contentDiv.appendChild(dot);
            }

            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addErrorMessage(error) {
            const errorDiv = document.createElement('div');
            errorDiv.classList.add('error-message');
            const icon = document.createElement('i');
            icon.className = 'fas fa-exclamation-circle';
            const text = document.createElement('span');
            text.textContent = error;
            errorDiv.appendChild(icon);
            errorDiv.appendChild(text);
            chatContainer.appendChild(errorDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function sendSuggestion(text) {
            messageInput.value = text;
            messageInput.style.height = 'auto';
            messageInput.focus();
            sendMessage();
        }

        async function sendMessage() {
            if (isLoading) return;

            const message = messageInput.value.trim();
            if (!message) return;

            // Clear welcome message on first message
            const welcomeMsg = chatContainer.querySelector('.welcome-message');
            if (welcomeMsg) welcomeMsg.remove();

            // Add user message
            addMessage(message, true);
            messageInput.value = '';
            messageInput.style.height = 'auto';

            isLoading = true;
            sendBtn.disabled = true;
            addLoadingMessage();

            try {
                const encodedMessage = encodeURIComponent(message);
                const response = await fetch(`/api/ollama/${encodedMessage}`);

                // Remove loading message
                const loadingMsg = document.getElementById('loadingMessage');
                if (loadingMsg) loadingMsg.remove();

                if (!response.ok) {
                    if (response.status === 500) {
                        addErrorMessage('Server error. Make sure Ollama service is running.');
                    } else {
                        addErrorMessage(`Error: ${response.statusText}`);
                    }
                } else {
                    const reply = await response.text();
                    addMessage(reply, false);
                }
            } catch (error) {
                // Remove loading message
                const loadingMsg = document.getElementById('loadingMessage');
                if (loadingMsg) loadingMsg.remove();

                addErrorMessage('Connection failed. Make sure the server is running and Ollama is available.');
                console.error('Error:', error);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        // Focus on load
        messageInput.focus();
    </script>
</body>
</html>
